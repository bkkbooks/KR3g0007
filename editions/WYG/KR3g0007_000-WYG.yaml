body:
  text: 提要皇極經世觀物外篇衍義術數類一數學之屬臣等謹案皇極經世觀物外篇衍義九卷宋張行成撰是書専明皇極經世外篇之義亦所進七易之一也皇極經世内篇前四卷推元㑹運世之序後四卷辨聲音律吕之㣲外篇則比物引類以發揮其藴奥行成以内篇理深而數畧外篇數詳而理顯學先天者當自外篇始因補缺正誤使其文以類相従而推繹其㫖以成是篇上三篇皆言數中三篇皆言象下三篇皆言理葢行成以意更定非復舊第然自明以來刻本率以外篇居前題為内篇未免舛互失序賴行成此本尚可正俗刻之訛且原書由雜纂而成本無義例行成區分排比使端緒易尋亦頗有條理雖乾坤闔闢變化無窮行成依據舊圖循文生義于造化自然之妙未必能窺至于邵氏一家之學則可謂心知其意矣魏了翁嘗稱其能得易數之詳而書不盡傳則宋代已不免散佚朱彞尊經義考但載皇極經世索隱而不及此書則沈湮已乆惟永樂大典所載尚為完本今據原目仍釐為九卷著于録乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序康節先生觀物有内外篇内篇先生所著也外篇門人所記先生之言也内篇理深而數畧外篇數詳而理顯學先天者當自外篇始外篇行于世乆矣闕數者三節脫誤者百餘字今補其闕而正其脫誤分數象理類相從為九卷輙衍其義以俟同志者擇焉蜀臨卭張行成序
