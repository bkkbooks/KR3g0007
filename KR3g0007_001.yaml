body:
  text: 皇極經世觀物外篇衍義卷一宋張行成撰觀物外篇上之上先生詩云若無揚子天人學安有莊生內外篇以此知外篇亦是先生之文門人蓋編集之爾天數五地數五合而為十數之全也天以一而變四地以一而變四四者有體也而其一者無體也是謂有無之極也天之體數四而用者三不用者一也地之體數四而用者三不用者一也是故無體之一以况自然也不用之一以况道也用之者三以况天地人也天數五地數五以竒偶言則一三五七九為天二四六八十為地以生成言則一二三四五為天六七八九十為地故曰數之全也天生乎動得太極之竒一氣之動靜始終分而為陽隂太少故曰天以一而變四也地生乎靜得太極之偶一氣之靜動始終分而為柔剛太少故曰地以一而變四也太陽為日太隂為月少陽為星少隂為辰以成天體四時行焉太極之竒退藏四者之間而不自見所以日月星辰與天而五除日月星辰則無天故曰四者有體一者無體也太柔為水太剛為火少柔為土少剛為石以成地體四維具焉太極之偶退藏四者之間而不自見所以水火土石與地而五除水火土石則無地故曰四者有體一者無體也日月星辰天之體盡矣水火土石地之體盡矣八象既全萬物咸備是謂有之極者謂天地之四也天以竒變四四成則一退居五地以偶變四四成則二退居十以一統四除四無一是謂無之極者謂天地之一也大抵太極居一萬化之本功成藏密用故不窮雖天地之大亦須藏一惟數無定象隨理圓通故或指一為一或指五為一或指十為一指一為一者原天地之始生也指十為一者總天地之既成也指五為一者分天分地各以一而變四故揚雄謂五五為土也然言五者必歸之天言十者必歸之地五當為無之極十當為有之極五為太虛沖氣十為大物元形有之極亦曰無者除四無一也天之體數四不用者一故天辰不見地之體數四不用者一故地火常潛天有四時冬不用地有四方北不用人有四體背不用雖不用而用以之生故無體之一以况自然不用之一以况道用之者三以况天地人人法地地法天天法道道法自然生出之序由乎自然之理也凡物未生之初必因無體之一以為本既生之後當存不用之一以為本不用之一即無體之一降而在我者也人皆有之賢者能勿喪爾是故一止不動則三用無窮揚子雲以北為玄而統三方以三方為天地人北方有罔有𡨕亦五數也𡨕當不用之一三者之所息藏乎密也罔當無體之一四者之所生出乎虛也𡨕終罔始息而復生有本者如是也二者皆係乎北别之則𡨕當為北罔當為中天之中在北是為辰極萬物之所生也故水土同包元胃相養而以數言之一即五五即一是故陽用雖一裂之則三隂體雖兩通之則一也體者八變用者六變是以八卦之象不易者四反易者二以六卦變而成八也老陽九少陽七共十六少隂八老隂六共十四陽與陽偶失之太過隂與隂偶失之不及九而六七而八皆成十五者太極三五之中也九六七八是謂四象九六之數各止一變揲蓍數故乾一坤一為二也七八之數一少一壯一究隂陽各有三變故男三女三為六也是謂八卦六變之中止有四變其二變大同小異故六卦反復視之亦共四卦而已不易者四乾坤坎離反易者二震巽艮兊體有八而用有六卦有八而爻有六所以天統乎體則八變而終于十六地分乎用則六變而終于十二也此造化之端倪天地之妙用也重卦之象不易者八反易者二十八以三十六變而成六十四也十者形之一一之數至十而後足十者坤之一而百者坤之十也卦數圖坤之位上得三十六下得六十四者體用足乎百數也易者變也足則無變矣故百數之中以六十四為卦體十之八也以三十六為爻用八之六也六十四卦反復視之三十六卦而已此則八中藏六體中藏用也三十六者四九也二十八者四七也天道盈于七而極于九極則退變故乾雖用九易不用九而用七其三十六卦之中不變者八變者二十八變者反復視之乃為五十六用此則九中藏七用之中亦以體藏用也以體藏用用必存本每使有餘以為變化之地是故自六十四而言常有二十八不用自三十六而言常有八數不變也易用七者蓍自七起從天盈數每一卦重為八卦凡七變自乾之六畫至坤之十二畫凡七數故一卦六爻直六日七分而成七日也故爻止于六卦盡于八䇿窮于三十六而重卦極于六十四也卦成于八重于六十四爻成于六䇿窮于三十六而重于三百八十四也爻止于六用者六變也卦盡于八體者八變也䇿三十六者六六也用自變也卦六十四者八八也體自變也爻重于三百八十四者六十四卦各用六也用因體變體用合一如四時各用三月也周易上經三十下經三十四反復視之各十八卦此三十六卦成六十四卦之理自漢以來未有言之者而文王孔子實先示之觀上下經用卦與所分隂陽之數則可知矣太玄潛虛或以四十五變八十一或以五十五變一百其數亦然而用各不同天有四時一時四月一月四十日四四十六而各去其一是以一時三月一月三十日也四時體數也三月三十日用數也體雖具四而其一常不用也故用者止于三而極于九也體數常偶故有四有十二用數常竒故有三有九用止于三故四時八節用皆以三變以十為一曰旬三旬而一月九旬而一時三十六旬而四時畢矣以五為一曰候三候而一氣九候而一節七十二候而八節周矣四時者天包地故以十數八節者分天地故有五數天地相偶乃有八體分至屬天四立屬地也體數有四有十二者四時十二月也用數有三有九者三月九十日也蓋十者一之足數六十四卦析一為十得六百四十以應天之四時時當有四月月當有四十日四四十六各去其一每時三月已先去其四月之數一百六十所餘四百八十則四十八之析故八卦之爻四十有八也每月三旬又再去其十二旬之數一百二十所餘三百六十則三十六之析故老陽之䇿三十有六也大率皆天三地四四為體三為用之理也一年分為四時析一為四成體之全也一時分三月三月分九十日三三而九致用之極也凡數皆祖乎大衍細究揲蓍之法之理則先生之言為不誕矣説具述衍中大數不足而小數常盈者何也以其大者不可見而小者可見也故時止乎四月止乎三而日盈乎十也是以人之肢體有四而指有十也月止于三孟仲季也三月而時革故不曰十二月也日盈乎十者甲乙丙丁戊己庚辛壬癸也故一旬十日大者不足天地數也小者常盈人物數也大者不可見小者可見故年包乎時除時無年時包乎月除月無時月包乎日除日無月大者統而小者分也天見乎南而潛乎北極于六而餘于七是以人知其前昧其後而略其左右也周天三百六十五度南北各分其半北極出地三十六度餘則皆潛南極入地三十六度餘則皆見天與人皆背北面南故南見北潛也用數三成于六兼餘分故有七也天體數四而用三地體數四而用三天尅地地尅天而尅者在地猶晝之餘分在夜也是以天三而地四天有三辰地有四行也然地之大舊本作火且見且隱其餘分之謂耶日十二時晝夜各半昏曉之際雖名隂陽相侵而皆為晝之餘分則所侵者實在夜也天地相尅之數亦然餘分本地數故以火况之實不及一分故火且見且隱天之辰全不見地之火半見半隱故曰天有三辰地有四行合之則七也乾七子兊六子離五子震四子巽三子坎二子艮一子坤至隂故無子乾七子坤六子兊五子艮四子離三子坎二子震一子巽剛故無子自乾七子至坤無子者以乾為主而言也自乾七子至巽無子者以坤配乾而言也共五十六子則用卦之數也自爻而言一卦六爻總三百三十六則八變之體數也自數而言一卦九數總五百有四則十二變之用數也以乾為主者天數也以坤配乾者地數也體用之變半以前則屬乎天半以後則分于地也坤巽無子者天以陽為德隂過者窮地以柔為質剛過者窮也天地之體四用者三不用者一天兼餘分不過乎七自隂陽言之則震巽不用故為無䇿自一陽言之則坤震不用故為無數自天地言之則坤巽不用故為無子以功成無為而言則乾坤退藏六子用事故文王八卦以乾坤居不用之位也詳解具通變圖中天有二正地有二正而共用二變以成八卦也天有四正地有四正共用二十八變以成六十四卦也是以小成之卦正者四變者二共六卦也大成之卦正者八變者二十八共三十六卦也乾坤離坎為三十六卦之祖也兊震巽艮為二十八卦之祖也天二正乾離地二正坤坎二變者天用兊震地用艮巽天四正兼頥中孚地四正兼大小過二十八變者餘二十八卦反復為五十六卦也小成八卦大成六十四卦二正共一變者一變而三并之則四體也二正共七變者三變而九并之則十六體也乾坤坎離為三十六卦之祖體之祖也艮震巽兊為二十八卦之祖用之祖也故周易上經用乾坤坎離下經用震巽艮兊也乾坤七變是以晝夜之極不過七分也艮兊六變是以月止于六共為十二也離坎五變是以日止于五共為十也震巽四變是以體止于四共為八也乾為日主年兊為月主月離為星主日震為辰主時辰天體也故七變以求年六變以求月五變以求日而四變以求體先天本以乾兊離震主日月星辰而兼坤艮坎巽者天四變含地四變也先天以偶卦當月之十二竒卦當日之三十每兩卦得六七四十二共為天之一變七變者二百九十四六變者二百五十二五變者二百一十四變者一百六十八也卦以一卦為一變者六辰也七六五四之變共四十四卦二百六十四爻則實用之數也七卦之爻四十二六卦之爻三十六五卦之爻三十四卦之爻二十四各隨天而用七變焉然後與兩卦當一變之數合者日月與卦變大小之用不同卦變屬物日月之變屬天也卦之正變共三十六而爻又有二百一十六則用數之䇿也三十六去四則三十二也又去四則二十八也又去四則二十四也故卦數三十二位去四而言之也天數二十八位去八而言之也地數二十四位去十二而言之也四者乾坤離坎也八者并頥中孚大小過也十二者兊震泰既濟也卦之正變共三十六每卦六爻則二百一十六爻揲蓍法乾之䇿二百一十六坤之䇿一百四十四共三百六十陽主用故二百一十六為用數之䇿并爻與卦得二百五十二為用數之用也三十六者老陽四九乾之䇿數也去四則少隂四八巽離兊之策數也又去四則少陽四七震坎艮之䇿數也又去四則老隂四六坤之䇿數也卦數三十二位者先天圖六十四卦分為左右左為天右為地每方三十二卦故應去四之數也乾坤坎離四卦不變與太極並存卦之去四以當蓍之去一故卦之位不用也天數二十八位者先天圖天自益以下地自豫以下為無數每方有數二十八故應去八之數也震巽艮兊肖乾坤坎離則為頥中孚大小過亦常存而不變故天之位不用也地數二十四位者每方四位不用者一用之者三每位八卦三位二十四卦故應去十二之數也兊與巽震與艮泰與否既濟與未濟皆反復互用之卦兊震泰既濟屬天故地之位不用也三十二卦而四卦入于無四體而一不用者天地所同然二十八者屬之天二十四者屬之地豈非天數七地數六天兼餘分之謂耶夫去乾坤坎離為三十二位通反對數則六十卦而已老陽三十六位通反對數則六十四卦而已是故地數二十四偶之而四十八天數二十八偶之而五十六皆為實數乃若三十二位偶之而六十四于六十卦之外虛加四卦二十四䇿通三百八十四者應二十四氣之閏數也三十六卦偶之而七十二于六十四卦之外又虗加八卦四十八䇿通四百三十二者應七十二候之閏數也是故六當地七當天八當坤九當乾天地為實乾坤為虗天地有窮乾坤無極也日有八位而用止于七去乾而言之也月有八位而用止于六去兊而言之也星有八位而用止于五去離而言之也辰有八位而用止于四去震而言之也日月星辰各備八卦之數故有八位存本而用用其用每減者上得兼下下不得兼上貴賤之等也日七位其數百三十三月六位其數一百二十星五位其數一百五辰四位其數八十八與七六五四之變理同而數異變以天為主位以地為主也日月星辰或用四位或用八位何也用四位者四四而十六主隂陽而言蓋天之變也用八位者八八而六十四兼剛柔而言蓋地之物也變在天而分于兩地物在地而宗于一天十六位者用十五位為五變總二百七十數餘乾之一不用以當九十散則為辰數也六十四位者用四十四位得數四百四十六則四百五十而虗四餘二十位不用得數百三十則一百二十六而盈四也餘詳解具通變圖中日有八位而數止于七去泰而言之也日去泰則月當去損星當去既濟辰當去益舉一隅也以先天方圖觀之其位與數皆可見矣月自兊起者月不能及日之數也故十二月常餘十二日也日起于一者乾也月起于二者兊也月不及日之數故日一年三百六十六日月一年三百五十四日也兊艮六變月之用數也易之變兩卦共四十二兊艮變數當得二百五十二而數止用百二十偶之而二百四十者亦餘十二日也餘十二日者日一年盈六日月一年縮六日共十二日以為閏乾陽中陽不可變故一年止舉十二月也震隂中隂舊本作陽不可變故一日之十二時不可見也兊陽中隂離隂中陽皆可變故月日之數可分也是以隂數以十二起陽數以三十起而常存二六也乾位竒中竒震位偶中偶隂陽純故不可變兊位竒中偶離位偶中竒隂陽雜故可變不可變則不可分可變則可分也故日月為易月一變十二日一變三十共四十二為天一變之數也十二三十其法以三因二因而算之二因者二六故十二三因則進位故三十也隂數起十二者以月數起也陽數起三十者以日數起也如一元十二會一會三十運一運十二世一世三十年隂偶數常自十二起者得太極之二而二六也陽竒數常自三十起者得太極之三而三十也隂二而二六者六用數地分乎用也陽三而三十者十全數天統其全也亦三天兩地而倚數之義也皇極經世因數法以二因者加十二而常終于二數以三因者加三十而常終于六數纍至于溝澗正載莫不皆然月之自變二而四矣必反于二日之自變六而八矣必反于六故曰常存二六二六者日月相錯天變之本數也此法亦如河圖竒偶之數以三以二而數纍至無極而終不失其本信乎數之不可逃也舉年見月舉月見日舉日見時陽統隂也是天四變含地四變日之變含月與星辰之變也是以一卦含四卦也尊統乎卑大統乎小是故陽統乎隂隂則分陽數而已分年為月分月為日分日為辰天四變含地四變者乾兊離震包巽坎艮坤也所以元會運世十六位止用日月星辰律吕之數則兼水火土石之四變而先天運數分用其半也日之變含月與星辰之變者乾包兊離震也所以十六位之中元之會運世十二與三百六十與四千三百二十之數實為會運世之元也一卦含四卦者乾兊離震巽坎艮坤之變四卦互相為用也故六畫之卦中爻互體復含三畫二卦與上下一體則四卦也皆陽統乎隂之義日一位月一位星一位辰一位日有四位月有四位星有四位辰有四位四四十有六位盡此一變而日月之數窮矣此一變上原脫一盡字自日之日至日之辰自辰之日至辰之辰凡十六位每三位五十四為一變五變而二百七十辰之辰得一千八百六十六萬二千四百為世之世每世三十辰得二日半則四千六百六十五萬六千日者大畜一元之日數也盡此一變而日月數窮者體數之用二百七十地以四體分天三用也十六位之中猶有一焉正一無盡以當九十為不用之一則以天辰不見去其辰數也故算法用算二百七十一枝天有四變地有四變變有長也有消也十有六變而天地之數窮矣天以震離兊乾為長巽坎艮坤為消地則反是一長一消共十六變此分天分地各以八卦之位而言變也蓋月一變十二日一變三十共得四十二為一變則一卦變七卦之爻數也一卦重為八卦得四十八爻去一用七者存本而言所謂地上之數起于二故六十四卦止用五十六卦者八七也天地十六變共六百七十二分消長而數各三百三十六即五十六用卦之爻數也若乃天統乎體八變而終于十六以乾為主自天而行兩卦當一變則同人當乎八變姤當乎十六變比卦位之數四之一者天一則地四也别而言之天統乎體地分乎用合而言之則天地皆有體用也日起于一月起于二星起于三辰起于四引而伸之陽數常六隂數常二十有二變而大小之運窮矣隂數常二下原脫十有二變一句日起于一者起一元也月起于二者起十二會也星起于三者起三百六十則運數也辰起于四者起四千三百二十則世數也此以運行變數而言當乾夬大有大壯四卦之數引而伸之陽數常六則小畜之年數也隂數常二則需之月數也運數在天故常六常二自小畜至臨六變得二百五十二自同人至震又六變得五百有四所謂地分乎用六變而終于十二此大小運極數也故曰大小之運窮矣體數有十六變而運數十二變用者三不用者一也三百六十變為十二萬九千六百三百六十者乾之五爻分而為大有之數則一元之運數也十二萬九千六百者乾之四爻分而為小畜之數得三百六十之三百六十則一元之年數也十二萬九千六百變為一百六十七億九千六百一十六萬一百六十七億九千六百一十六萬者乾之三爻分而為履之數得十二萬九千六百之十二萬九千六百則元之元也一百六十七億九千六百一十六萬變為二萬八千二百一十一兆九百九十萬七千四百五十六億二萬八千二百一十一兆九百九十萬七千四百五十六億者乾之二爻分而為同人之數得一百六十七億九千六百一十六萬之一百六十七億九千六百一十六萬則元之元之元之元存一與十二之外天之第四變也此分數也分大為小乾道運行散為萬物四變當乾之中爻即坎離用四位生物之數也夫乾之分數六爻大小運數去初上而不用者六而用四也同人之數分為十二會而用數之用以開物八會為主者亦六而用四也是故八卦用六爻者四而用三主天而用則乾坤主之六爻用四位者三而用二主地而用則坎離主之也以三百六十為時此立時數時即世也一為一杪十二杪為一分三十分計三百六十杪為一時若以時當世一世三十年計三百六十月則三百六十之數一當一月矣以十二萬九千六百為日此立日數日即運也自一而進積三十以當一杪十二杪計三百六十當一分三十分計一萬八百得三百六十杪當一時十二時計一十二萬九千六百得四千三百二十杪當一日若以日當運一運三百六十年計一十二萬九千六百日則一十二萬九千六百之數一當一日矣以一百六十七億九千六百一十六萬為月舊本脫自一十六萬為月至十二萬九千六百為日一節此立月數月即會也自十而四進積十二萬九千六百以當一杪十二杪計一百五十五萬五千二百當一分三十分計四千六百六十五萬六千當一時十二時計五億五千九百八十七萬二千當一日三十日計一百六十七億九千六百一十六萬當一月若以月當會一會一萬八百年計四千六百六十五萬六千時每時三十分計一十三億九千九百六十八萬分每分十二杪計一百六十七億九千六百一十六萬杪則一百六十七億九千六百一十六萬之數一為一杪矣以二萬八千二百一十一兆九百九十一萬七千四百五十六億為年此立年數年即元也自三十而十進積一會一萬八百之元之元以當一杪十二杪計十二會十二萬九千六百之元之元當一分三十分計三十元之元之元當一時十二時計三百六十元之元之元當一日三十日計一萬八百元之元之元當一月十二月計十二萬九千六百元之元之元當一年若以年當元一元十二萬九千六百年計五億五千九百八十七萬二千時一百六十七億九千六百一十六萬分二千一十五億五千三百九十二萬杪每杪得一十三億九千九百六十八萬則二萬八千二百一十一兆九百九十萬七千四百五十六億當二千一十五億五千三百九十二萬杪矣故先生以一十三億九千九百六十八萬為一年以當一杪十二杪計一百六十七億九千六百一十六萬以當一分每一百六十七億九千六百一十六萬杪以進三十運計一萬八百年即當一十三億九千九百六十八萬分也以分于一萬八百年之間每年得四千三百二十時計一十二萬九千六百分而一百五十五萬五千二百杪矣天之一時得三十分每分得十二杪每杪當一年計三百六十年每年得一十三億九千九百六十八萬則三百六十杪計五千三十八億八千四百八十萬者物之分數也先生不立杪之名者天之長數以乾為元自夬四變凡一百六十八至履為分而止若消數復以履為元自兊四變亦一百六十八至同人為分而止也則大小運之數立矣立大小運數者以明用也體數有三百八十四而用數止于三百六十體數之用有二百七十而用數之用止于二百五十二所以一元十二會有三百六十運而開物八會止用二百四十運加閏數不過二百五十二也自一至極天地之大數十六乾當一坤當二載總六十四卦之變得其十五而此運數用止于七者用其天數也蓋天變贏于七物數盈于兆是故謂天子之民為兆民也後天之數五則易二篇之䇿其用至萬物先天之數七則經世大小運之數其用至兆物也自一至萬兆大數則七細别之則二十一蓋三七之變也其起運之法用卦氣圖天而地也觀物之法用律吕圖地而物也會分十二位分十六在天有生物之時在地有生物之數元會運世得數之多寡不同故一十百千萬億兆有七等之物不同也二者天地萬物之數厯律之數也二萬八千二百一十一兆九百九十一萬七千四百五十六億分而為十二前六限為長後六限為消以當一年十二月之數而進退三百六十日矣此當以元經會之數也十二月即十二會三百六十日即三百六十運以元之元數為一分每會得一萬八百元分每運得三百六十元分總一元之分數計得十二萬九千六百元之元之元陽三百六十為進隂三百六十為退三百六十乃成七百二十矣隂陽之分在年則以消長在月則以朓朒在日則以晝夜而分也一百六十七億九千六百一十六萬分而為三十以當一月三十日之數隨大運消長而進退六十日矣此當以會經運之數也一月三十日即一會三十運也自月言之朓朒分用一進一退消長各數則成六十運自日言之晝夜又分用一進一退朓朒各數則一月之數成百二十日一會之數成百二十運也十二萬九千六百舊本脫至此分而為十二以當一日十二時之數而進退六日矣此當以運經世之數也以元經會則年卦月卦會經運則氣卦候卦運經世則日卦時卦之數也一日十二時即一運十二世也一為一杪十二杪為一分三十分為一時總一日得四千三百二十杪十二萬九千六百則三十日之杪也積一運之年凡得五億五千九百八十七萬二千杪則泰之數也曰進退六日者舉一變之數也以日當年則六日為六年進之而六十年在小運為十變在大運為一變蓋天道以六而變必有餘分小則六日者歷六辰也大則六十年者甲子甲午各一世也是故大運六十年而一變者五運之數也小運六年而一變者六氣之數也自五運言之天始于甲臨于子地始于已臨于邜甲巳之間中見土運土金水木火以次相傳天終于癸亥地終于戊寅别而言之各有六十合而言之共為六十也如是六變而一周天矣自六氣言之天始于子而終于已地應之則始于卯而終于申天始于午而終于亥地應之則始于酉而終于寅司天司地通為六氣别之則十二而二十四合之則十二而六也如是六十變亦一周天矣是故大運以六十而變六變通餘分得三百六十六小運以六而變六十變通餘分亦成三百六十六也三百六十以當一時之數隨小運之進退以當晝夜之時也一時即一世自時言之則三百六十為杪數自世言之則三百六十為月數也三百六十月則一世之年矣當晝夜之時則一時成二時一時得百八十杪積一日實得二千一百六十杪者分用其半也曰隨大運之消長者子以後六月為長午以後六月為消隨小運之進退者子以後六時為進午以後六時為退大運有消長進退小運有進退無消長消長者進退之積也十六變之數去其交數取其用數得二萬八千二百一十一兆九百九十一萬七千四百五十六億天統乎體八變而終于十六月之變十二日之變三十凡四十二共為一變天起于一去乾而數自夬而行八變三百三十六得十六卦至同人又八變十六卦至姤則地之交數也同人之數即二萬八千二百一十一兆九百九十一萬七千四百五十六億也分為十二限前六限為長後六限為消每限得十三億九千九百六十八萬之一百六十七億九千六百一十六萬自子至已為長自午至亥為消此盡舉一年之數包退數閏數在其間矣若月日則消長之中各有進退也每一百六十七億九千六百一十六萬年元會運世年天之五也月日時分杪地之五也元以年為年會以月為年運以日為年世以時為年年以分為年月以杪為年月之一杪當元之一年故稱杪為年此即一百六十七億九千六百一十六萬之一十三億九千九百六十八萬也每年當一十二萬九千六百會每月當一萬八百會每日當三百六十會每時當三十會總百六十七億之數得十二年為十二杪也開一分進六十日也六限開六分進三百六十日也總一元之數析為十二大分一大分則十三億九千九百六十八萬之一百六十八萬之一百六十七億九千六百一十六萬也以進六十日則每日開落一百八十元分于全數止用其半者分其半以為退數也元會運世體四用三元之用至世會之用至年運之用至月而止故此分數用至月之年若自泰之辰數復為元而起至同人之數亦當月之年也猶有餘分之一故開七分進三百六十六日也天以六變故象圖天卦去乾坤坎離餘三百六十爻以當天之用數天實有三百六旬六日故每卦六爻當六日必加餘分焉亦後天卦氣圖六日七分之法也餘分亦當一日六十卦則餘六十矣總餘分之用雖實得六日計浮數之名則虗加十倍故先生立大運之數正數以六十日得一分而閏數以六日得一分也閏數之分一萬八百元之元之元得六十運之數先生但云六日者實數則六運故也地之承天析一為四故在卦氣圖則分于二十四氣中盈朔虗各十二而有二十四運也夫十六變之數用數當十二會則交數亦當十二會大運進數兼閏用七會則退數亦當七會通之為十四會則交數之中侵其二會矣所謂陽侵隂也二十四而用十四者十二分用七也小運十二萬九千六百而用九萬七百二十者十分用七也蓋十用七者主十日而用天之用也故律吕聲數陽剛四十又四之百六十而用一百十二者十用七也十二用七者主十二辰而用地之用也故揲蓍少陽數每用四十八又六之二百八十八而用一百六十八者十二用七也大小運之用用數用十之七而體數用十二之七者日法本四千三百二十杪用數以三千六百杪進一日則十二之十爾日數從天辰數從地也先生于小運舉用數十用七而止用八會又十分會之四于大運舉體數十二用七而用十四會者陽一而隂二體者有兩虗實各半用者合一全用其實也蓋一年止有七百三十晝夜太玄以一晝一夜為一日通踦贏二贊為三百六十五日經世以晝夜各為一日又以零三時亦為二日故一年進退用十四會數共七百三十二日餘分每一日用十日之數則成八百四十日也實數三百六十日成七百二十日者隂分乎陽析一為二也餘分六日成百二十日者天地既析一為二人物又析一為十也若計其實則用數二百五十二之中取二百四十而日用八時成三百六十為一年之用餘分六日散於六甲得六十甲子閏數六日合之而百二十為人物之用也夫卦六十四者十六之四也天用三分以一分與地故地有十六位而八卦用四十八爻也四十八者十二之四也地用三分以二分與物故年有三十六旬而人為百二十年之物也是故一年四時時本有四月月本有四十日各去其一用三百六十日而人在天地間當閏餘之扐氣朔之虗也其退亦若是矣此立大運法也前法以前六限為長後六限為消盡取十二限數進退三百六十日此乃六限進三百六十日又以一限進六日而曰退亦若是者細别而言之也一元運數止有三百六十陽為進隂為退所謂隂者分陽而已隂陽賡續分治一元别而言之各有三百六十者隂分乎陽析半數也合而言之共成三百六十者陽包乎隂總全數也故此大運法别退數閏數而言以明天地之數隂陽相須分半而通用正閏相生同本而異名也十二萬九千六百去其三者交數也取其七者用數也用數三而成于六加餘分故有七也此立小運法也大運法専明體則小運之體可知小運法專明用則大運之用可知互見也運者用也在體為體之用者用數三百六十也在用為用之用者用數之用二百五十二也交數則不用之數也用數顯陽也交數幽隂也天統乎體自十六變之數而言用數八交數八隂敵乎陽者天之消長各四變地之消長亦各四變主乾坤子午而言冬夏之分也隂陽相生冬夏相配君臣相須天五地五之理也地分乎用自一元之數而言用數七交數三陽勝乎隂者天在地上者七交而在地下者三主坎離卯酉而言書夜之分也陽侵乎隂晝侵乎夜君侵乎臣三天兩地之理也先天八卦用六爻乾坤主之者體也六爻用四位坎離主之者用也所以體數實統三百六十運之全用數止當二百四十運則六之四也先生經世以元經會備述一元而止載帝王之當世首者總其大數天之體數也以會經運自開物至閉物止述二百四十運而兼載餘分閏位者别其分數地之用數也以運經世起堯之世至五代而終備載君臣治亂之迹者析其細數人物之世數也七之得九萬七百二十年十二萬九千六百之中十而取七是其數也地數十二開物于寅中閉物于戌中故八為用四為交天數十陽六隂四天兼餘分獨用其七故七為用三為交交數之中猶有用數存焉者天以餘分與物地必有合是故三百六十以二百五十二為用數之用二百六十四為實用之數也半之得四萬五千三百六十年以進六日也用數之中取其半者又自分隂陽以明消長之用也此數六而十二十二而二十四者坎離迭緯消長朓朒一晝一夜用必有合也此包合數閏數而言故曰以進六日下别合數閏數而言故以四萬三千二百年進十二日又以餘數二千一百六十年各進六分也日有晝夜數有朓朒以成十有二日也此明隂陽之運日月之變一長一消一進一退數必有合六數之中日分乎晝夜數分乎朓朒則各成十二也故一以為二既一以為二各兼消數則以二為四可知矣所以進退六十日進退六日與夫當晝夜之時皆用半數也每三千六百年進一日凡四萬三千二百年進十有二日也餘舊本衍一有字二千一百六十年以進餘分之六合交數之二千一百六十年共進十有二分以為閏也卦氣圖以乾兊離震包坤艮坎巽者乾坤之體數主天一而言則陽為進隂為退律吕圖以坤艮坎巽匹乾兊離震者坎離之用數主地二而言則隂陽互為進退是故小運之用不言其退也以十二萬九千六百年分為十二以當一日十二時之數者小運體數也一時當一世一萬八百年進一世一元之年共進十二世則一運之全數也此云每三千六百年進一日者用數也進十二日積之則百二十年有進必有退合之而二百四十年則一運用數之八世也閏數以四千三百二十年進十二分比正數則十二年也蓋以時法推日法一萬八百當得三十時十二萬九千六百當得三十日一變十二當需之數為一年再變三十當大畜之數為一世又變十二當泰之數為一運則一運三百六十年而一年三百六十日之全數也用數于十二萬九千六百之中取九萬七百二十以進退六日合之而二十四加閏數十二分共二十五日二分積三千六百之九萬七百二十得三億二千六百五十九萬二千當泰之數十二分之七為三百六十之二百五十二則一運之用數也若準大運法以一十三億九千九百六十八萬為一年則自泰七進至損之數得一十三億九千九百六十八萬之三億二千六百五十九萬二千以當一運之日又一進至臨則十二運之數其積數于臨九百兆之數亦用十二分之七也又三十分之為同人則三百六十運而每運用二百五十二年矣此大小運用數之合也同人者八變之體數也計三百三十六臨者六變之用數也計二百五十二六變之數自小畜十二萬九千六百之年數而行八變之數自夬十二之會數而行先生於大小運數大運舉同人數者要其終小運舉小畜數者原其始也反覆互舉使學者思而得之爾夫三百六十之中十用其七得二百五十有二日小運法進十二日為百有二十則退十二日亦為百有二十共二百有四十矣餘分之六則陽之盈六日氣之餘分也交數之六則隂之縮六日朔之虗分也共為十二以正數論之此十二數朓朒晝夜分用亦偶之為二十四矣故用數之用二百五十二而實用之數二百六十四也故小運之變凡六十而成三百六十有六日也先生於小運法専言其用未有此語者以明小運之體亦有三百六十六與大運之體不殊也小運之體既同於大運則大運之用無異于小運復何疑哉是故先生大運正數六分用六會得六萬四千八百元之元之元閏數一分用一會得一萬八百元之元之元併正閏之數則十二萬九千六百年每年得七萬五千六百元之元之元元之元者大運一小分之數也一分析為十二杪則二年得九十萬七千二百杪矣若凖日法之體以四千三百二十杪進一日而用其半則正數六會共進三百六十日閏數一會共進六十日凡六日而加閏一日并正閏之數以七日為六日則每二千五百二十杪而進一日總計九十萬七千二百杪以進三百六十日而餘分六日則藏乎三百六十日之中若凖小運之用以三千六百杪而進一日總九十萬七千二百杪共得二百五十二日而閏數十二日則顯乎二百四十日之外若用數亦以閏數十二包于正數二百四十之中則每正數三千六百年必加閏數一百八十年總計三千七百八十年而後進一日也且夫六十三者餘分時數之所積也若一析為十則為六百三十矣故積其數而與加閏之數合三千七百八十者六百三十之六也又積其數而年得二百五十二日則六十之四而加閏之日也二千五百二十者六百二十之四也又積其數而年得三百六十六日則六十之六而加餘分之日也六者三天也四者兩地也天統乎體而託地以為體地分乎用而承天以為用天地相依體用相附經世卦氣圖體數以四爻直一日總之而一年通閏得三百八十四日者兩地而三天也故大小運體之用數亦用兩地而成于三天也用數以六爻直一日總之而一年通閏得二百五十六日者三天而兩地也故大小運用之用數亦用三天而成于兩地是故用數之用二百五十二自物數言之則自草木萌動至地始凍為開物八月而加閏之日自人數言之則日用八時四分七時二分為正年得二百一十六日當乾之䇿一時二分為閏年得三十六當坤奉乾一分之䇿也所以然者人為天之用其用無冬夏而有晝夜以日計雖用十分之七總于一年則十用其全者是謂兩地而三天故天統乎體也物者地之用其用無晝夜而有冬夏以日計雖用十分之全總于一年則十用其七者是謂三天而兩地故地分乎用也夫天地變化體用不同要之天以地為用用數實在乎坤是故乾坤三男三女七八九六之䇿二百四十者坤之䇿二十四而十析之也一卦六爻均之用䇿各三十并二卦十二爻共三百六十者乾之䇿三十六而析之也數有十乾之䇿十之而用為十二者陽進二也坤之䇿十之而用為八者隂退二也所以日有十辰有十二而卦止有八八卦用六爻乾坤主之六爻用四位坎離主之乾坤雖用六爻初上無位實用不過乎八是故用數三百六十用數之用二百五十二主天而言一年用十二月主地而言一年止用開物之八月也夫用數有三百六十用數之用有二百五十二生物之數有二百五十六而實用之數二百六十四其别何也蓋用之用生物之時也數止有二百五十二地加其一體不過二百五十六物又加天地各一體不過二百六十四二百六十四者實用之物數也然運行之數三百六十皆為天之用一嵗必期三百六十日而此實用之物數布于其間所以律吕用數二百六十四布于元會運世十六位之中每位二百四十計三千八百四十小位以應三百八十四爻則閏嵗三百八十四日之數也餘分之六在其中矣是故卦氣圖在日數則三百八十四日在時數則二百五十六日者止有三千七十二時故也
