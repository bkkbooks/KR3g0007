body:
  text: 皇極經世觀物外篇衍義卷二宋張行成撰觀物外篇上之中乾爲一乾之五爻分而爲大有以當三百六十之數也乾之四爻分而爲小畜以當十二萬九千六百之數也乾之三爻分而爲履以當一百六十七億九千六百一十六萬之數也乾之二爻分而爲同人以當二萬八千二百一十一兆九百九十萬七千四百五十六億之數也乾之初舊本作六爻分而爲姤以當七秭九千五百八十六萬六千一百十垓九千九百四十六萬四千八京八千四百三十九萬一千九百三十六兆之數也舊本闕此一節是謂分數也分大爲小皆自上而下故以陽數當之如一分爲十二十二分爲三百六十也乾五爻分爲大有當三百六十之數四爻分爲小畜則三百六十之三百六十也三爻分爲履則十二萬九千六百之十二萬九千六百也二爻分爲同人則一百六十七億九千六百一十六萬之一百六十七億九千六百一十六萬也初爻分爲姤倍數亦然大有初分乾得二卦爲辰小畜再分乾倍二得四卦爲日履三分乾倍四得八卦爲月同人四分乾倍八得十六卦爲年姤五分乾倍十六得三十二卦爲世一世之辰當一運之日一㑹之月一元之年以世推之至于一元皆可知也易卦六爻一爻不變生則一居下以命出性也成則一居上以性出命也故六十四卦陰陽皆自初生而八純之卦世爻皆在乎上先生分乾之數自五而起惟上不動世爻故也所以人之命門在下性門在上養生者保精養性者保神剥之上九碩果不食降而反生剥則爲復性乃生命也一生二爲夬當十二之數也二生四爲大壯當四千三百二十之數也四生八為泰當五億五千九百八十七萬二千之數也八生十六為臨當九百四十四兆舊本衍一四字三千六百九十九萬六千九百一十五億二千之數也十六生三十二爲復當二千六百五十二萬八千八百七十垓三千六百六十四萬八千八百京二千九百四十七萬九千七百三十一兆二千萬億舊本闕此一節之數也三十二生六十四爲坤當無極之數也乾坤互變九變主一子七九六十三卦而窮餘六爻不盡葢八變而三百三十六體數極矣餘八卦四十八爻當坤之一位所謂無數也易曰坤以藏之坤非真無也藏而不見所謂宻也故先天坤當無數而先生謂當無極之數者既徃之數未盡于明方生之數已潜于幽此之謂無極也若夫九變各有六爻不盡則乾坤自存其本也乾不盡而復生焉坤不盡而姤生焉故八變五十六卦餘八卦不盡體不可盡也九變三百七十八爻餘六爻不盡用不可盡也體者物也用者氣也是故數起于一二十變而至萬兆同人當之又二十變而至秭姤當之又四十變而至載坤當之是故九九老陽之變也坤當無極之數者雖八十一變未至于極亦如太𤣥八十一首七百二十九賛而天度尚餘九辰也是謂長數也長小爲大皆自下而上故以隂數當之所謂分數長數者有地而後有二故地上之數起于二十二者二六也二六者地二之用用之體也有地之後用已成體故天地之變化氣感于形形應于氣陽先分之以立其大限隂乃長之以充其細數也陽分則虛虚爲隂故自上而下者隂生于上爲陽中之隂也隂長則實實爲陽故自下而上者陽生于下爲隂中之陽也自隂之形數言之則爲長自陽之氣數言之則爲消葢一分之初多少已定故人夀百嵗自隂之長數而言一年爲増一嵗若自陽之分數而言則一年爲減一嵗也此葢隂陽並行相爲終始天以一三五七九而造始地以二四六八十而續終所謂乾知大始坤作成物者也若迭為消長則此長而彼消彼長而此消故由子至己自六至九自少至多爲陽長隂消由午至亥自九至六自多至少爲陰長陽消此隂陽分兩各爲主者也隂陽並行者天之一而二也隂陽分兩者地之二而四也天統乎體故八變而終于十六地分乎用故六變而終于十二天起于一而終于七秭九千五百八十六萬六千一百一十垓九千九百四十六萬四千八京八千四百三十九萬一千九百三十六兆舊本闕此一節地起于十二而終于二百四垓舊本垓作秭六千九百八十萬七千三百八十一京舊本京作垓五千四百九十一萬八千四百九十九兆七百二十萬億也天圓主用用以體立故統乎體地方主體體以用行故分乎用八者體數也十六者八之偶也天統乎體故得體之數八變而終于十六六者用數也十二者六之偶也地分乎用故得用之數六變而終于十二數體者存乾之一自夬八變至同人則三百三十六又八變至姤而終則六百七十有二也數用者存大壯之四自小畜六變至臨則二百五十有二又六變至震而終則五百有四也天從體起用故由二歴六以六而終其數總二十二則五六之合而偶之者物數也故曰天終爲萬物也地攝用歸體故由六歴二以二而終其數總十有九則九十之終而合之者閏數也故曰地歸于天也天去一而數地去四而數故蓍去一而卦去四也天之有數起于乾而止于震餘入于無者天辰不見也天數至震而不用地之體雖在而無用故先終也又曰天起于一而終于七秭地起于十二而終于二百四垓者一乾數也七秭即姤數也起于一者體數以乾爲主自夬而行至姤則十六變也十二夬數也二百四垓即震數也起于十二者用數以夬爲主一分而三十爲大有之運數一長而十二爲大壯之世數先得一變足地之體然後自小畜而用行至震則十二變也地之前六變先存一變得二百九十四者蓍六用之全數也地者天之用所謂天變其體不變其用故陽常存一而乾坤用七變也有地然後有二有二然後有晝夜寒暑屬天所謂分隂分陽晝夜在地所謂迭用柔剛故曰剛柔者晝夜之象也寒暑者乾坤之用晝夜者坎離之用也二三以變錯綜而成故易以二而生數以十二而起而一非數也非數而數以之成也天行不息未嘗有晝夜人居地上以為晝夜故以地上之數為人之用也二三以變者二與三竒偶相恭以變葢五數也地分其二故二因十二天分其三故三因三十亦參天兩地而倚數之理也後天參兩為衍數五十先天二三為變數四十二後天先虚其一以為七七之蓍數又掛其一乃合八卦之爻數先天一卦變八卦一以為本七以為用故日月以四十二為一變也後天用乾坤九六之變者隂陽寒暑之變也先天用坎離日月之變者剛柔晝夜之變也以二生者變易也以十二起者用數自夬而起其位則二其數則十二也蓍數揲一卦則存六冄一卦又存六者二六為地之用數故兩卦偶而後用在年則十二月在日則十二時以當天之十二次地之十二野人之十二物也天無晝夜此之謂一一非數者以其不變也以地上數為人之用故大數則一元統十二㑹自十二而分小數則一分統十二杪自十二而積也天自臨以上地自師以上運數也天自同人以下地自遯舊本遯誤作剥以下年數也運數則在天者也年數則在地者也天自賁以上地自艮以上用數也天自明夷以下地自否以下交數也天自震以上地自晉以上有數也天自益以下地自豫以下無數也先天圖以左右數之則乾兊離震為冬至迄夏至為陽屬天巽坎艮坤為夏至迄冬至為隂屬地以上下數之則乾兊㢲坎為晝屬天艮坤離震為夜屬地故師臨以上各十六卦為天之天地之天之元㑹運世之數而在天同人遯以下各十六卦為天之地地之地之年月日時之數而在地運數少而年數多天數統而地數分臨當九百兆之數同人當二萬兆之數師當七千溝之數遯當二十三萬溝之數也賁艮以上為用者四十六卦二百七十六爻則體數之用而加餘分之數也明夷否以下為交者四分之中三分為用一分為交交數主剛柔言以復為主自明夷至頥自否至坤皆八也震晉以上為有者有數主乾而言自晉至姤自震至夬皆二十七卦其爻三百二十四并乾五十有五則三百三十爻也益豫以下為無者無數存坤以為主自益至復自豫至剥各四則無數之四十八也地之交數不數謙者用數増賁以存乾故交數減謙以存坤也用數四十五卦存乾以當陽盈之六日交數十五卦存坤以當隂虛之六日地之無數起于豫者天數存乾以主有故地數存坤以主無也月以十二日以三十而變自一至萬萬極凡九十七數自乾之一至坤之二載以當無極之數六十四卦得八十一數具細算在極數中天之有數起乾而止震餘入于無者天辰不見也地去一而起十二者地火常潛也故天以體為基而常隠其基地以用為本而常藏其用也地二也去一而數起十二者二六即二也皇極經世日起于乾月起于夬夬之數即十二位即第二也起乾而止震者所謂天數二十八位也若從用數去四自小畜而起至震則二十四而已所謂六變而終于十二也地之用在天故藏一于始天之體在地故隠四于終亦蓍去一而卦去四之義也用或去四者以地為用體成而後用行經世起于㑹者用至于年則其用在年故年數在地也一時止于三月一月止于三十日皆去其辰數也是以八八之卦六十四而不變者八可變者七舊本衍七字七八五十六其義亦由此矣一時本四月而用三月一月本四十日而用三十日皆為去其辰數者三用而一不用也不變者八七變而一不變天三地四天有三辰地有四行也天辰不見地火常潛天地各三本當用六而用七者天侵地以為餘分也陽爻晝數也隂爻夜數也天地相銜隂陽相交故晝夜相雜舊本雜誤作離剛柔相錯春夏陽多也故書數多夜數少秋冬隂多也故晝數少夜數多先天圖左有一百十二陽八十隂上亦然右有一百十二隂八十陽下亦然隂中有陽陽中有隂隂陽相交未嘗相無故應于人世則晝夜相雜剛柔相錯離兊當春有五十六陽四十隂坎艮當秋故反之乾㢲當夏有六十四陽三十二隂坤震當冬故反之春秋晝夜等而隂陽數不等者春主陽生秋主隂殺在日月則晝夜之數同在天地則隂陽之分異故春晝多明秋晝多暗也體數之䇿三百八十四卦數圖坤得一百上卦三十六者六六為用之全下卦六十四者八八為體之全故六十四卦三百八十四爻應天地之全體去乾坤坎離之䇿為用數三百六十乾坤坎離四正之卦反復不變六十卦頼之以立故去之以存太極之體餘三百六十爻當一期之日以為元氣之用體數之用二百七十用數三百六十天以之而運行天之用也天地之體四其用者三故爻數有三百八十四而四卦之數有二百八十八則四分之三也爻去二十四而用三百六十則數去一十八而用二百七十所以二百七十為體數之用也自爻數而言則天不用震之八卦地不用坤之八卦也去乾與坎離之䇿為用數之用二百五十二也其言二百七十者已去乾離坎之䇿矣又云去乾與坎離之䇿何也葢用數之中仍自存體其曰用數之用則所存乾與坎離之數當為用數之體也天下之理體用無常當時為是自三百八十四言之則三百六十為用自二百七十言之則所存之十八䇿又為體矣體中有用用中有體未嘗離也存太極之體餘為天之用存天之體餘為地之用存地之體餘為人物之用常存其本用之不盡是故生生不窮體數之用二百七十其一百五十六為陽一百十四為陰去離之䇿得一百五十二陽一百一十二陰為實用之數也葢陽去離而用乾陰去坤而用坎也乾兊離㢲坎艮六卦之變共二百八十八爻陽一百六十去乾六坎二離四則所餘者一百四十有八也陰一百二十八去坎四離二則所餘者一百二十有二也其曰一百五十六為陽一百十四為陰者陽去離之隂而用乾隂用坎之陽而去坤乾坎二卦用者八陽坤離二卦去者八隂尅隂之八増陽之數所以應隂陽剛柔四象之用也去離之䇿得一百五十二陽一百十二隂者陽去四陽爻隂去二隂爻也是以天之陽䇿一百十二去其隂也地之隂䇿一百十二陽䇿四十去其南北之陽也極南大暑極北大寒物不能生是以去之也其四十為天之餘分耶陽侵隂晝侵夜是以在地也合之為一百五十二陽一百十二隂也取先天圖中隂陽之䇿應天地實用之數也乾兊離震一百九十二爻陽一百十二隂八十坤艮坎㢲一百九十二爻隂一百十二陽八十天之隂盡去矣地之陽止去其不能生物者故存坎艮四十陽以為天之餘分也乾坤之䇿三百六十當期之日先後天皆以六十卦三百六十爻當期之日故雍稱一爻當一䇿也陽去乾之䇿隂去坎之䇿得一舊本作二百四十四舊本作六陽一百八隂為用數之用也
